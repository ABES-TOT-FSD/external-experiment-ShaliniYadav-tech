
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Cards</title>
    <style>
    .container{
            margin: 60px;
            display: flex;
            gap: 40px;
        }
        .cards{
            justify-items: center;
            background-color:rgb(253, 248, 248);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            height: 50%;
            width: 50%;
            border-radius: 20px;
            align-items: center;
            padding: 30px;
        }
         .avatar{
           justify-content: center;
           font-family: Cambria, Cochin, Georgia, serif; 
           color:#ffffff;
            background-color:rgb(241, 23, 216);
            border-radius: 50%;
            padding: 20px;
            text-align: center;
            height: 60px;
            width: 60px;
        }
        .name{
            font-family:Verdana, sans-serif;
           font-weight: bold; 
           text-align: center;
        }
        .details{
            font-size: 20;
            font-family:sans-serif ;
            text-align: center;
        }
        </style>
</head>
<body>
    <div class="container">
    <div class="cards">
                <div class="avatar">
                    <h3>AS</h3>
                </div>
                <div class="name">

                </div>
                <div class="details">
                    <p> B.Tech - CSE</p>
                    <p>Roll-No-26CS1001</p>
                    <p>1st Year</p>
                </div>
            </div>
             <div class="cards">

             <div class="cards">

</html>
